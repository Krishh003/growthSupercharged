services:
  web:
    image: growth-supercharged:1.0.0
    build: .
    ports:
      # host:container. Host port is 8090 (3000 was taken on the server).
      # To use a different host port, change the 8090 below and re-run
      # `docker compose up -d`. Container always listens on 3000 inside.
      - "8090:3000"
    restart: unless-stopped
